name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 2

      - name: Generate deploy diff
        run: |
          echo "DEPLOY_SHA=$(git rev-parse --short HEAD)" > deploy-info.txt
          echo "DEPLOY_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> deploy-info.txt
          echo "---" >> deploy-info.txt
          git diff HEAD~1 --stat >> deploy-info.txt
          echo "---" >> deploy-info.txt
          git diff HEAD~1 >> deploy-info.txt

      - name: Generate .env file
        run: |
          cat > .env <<'ENVEOF'
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          KAN_API_KEY=${{ secrets.KAN_API_KEY }}
          KAN_BASE_URL=${{ secrets.KAN_BASE_URL }}
          CLAUDE_REFRESH_TOKEN=${{ secrets.CLAUDE_REFRESH_TOKEN }}
          OUTLINE_API_KEY=${{ secrets.OUTLINE_API_KEY }}
          OUTLINE_BASE_URL=${{ secrets.OUTLINE_BASE_URL }}
          RADICALE_PASSWORD=${{ secrets.RADICALE_PASSWORD }}
          SPRINT_START_DATE=${{ secrets.SPRINT_START_DATE }}
          REMINDER_INTERVAL_HOURS=${{ secrets.REMINDER_INTERVAL_HOURS }}
          ADMIN_USER_IDS=${{ secrets.ADMIN_USER_IDS }}
          PLAYWRIGHT_ENABLED=${{ secrets.PLAYWRIGHT_ENABLED }}
          GITHUB_TOKEN=${{ secrets.GREMLIN_GITHUB_TOKEN }}
          DEPLOY_SHA=${{ github.sha }}
          ENVEOF

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy compose + env
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key" \
            deploy/docker-compose.yml .env \
            ubuntu@${{ secrets.DEPLOY_HOST }}:~/apps/gremlin/

      - name: Deploy source
        run: |
          rsync -avz --delete \
            --exclude node_modules \
            --exclude dist \
            --exclude .env \
            --exclude data \
            --exclude .git \
            --exclude .github \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ \
            ubuntu@${{ secrets.DEPLOY_HOST }}:~/apps/gremlin/src/

      - name: Build and restart
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.DEPLOY_HOST }} \
            'cd ~/apps/gremlin && docker compose build --pull && docker compose up -d'

      - name: Verify deployment
        run: |
          for i in $(seq 1 8); do
            HEALTH=$(ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.DEPLOY_HOST }} \
              'curl -sf http://localhost:8080/health 2>/dev/null || echo "{\"status\":\"unreachable\"}"')
            STATUS=$(echo "$HEALTH" | jq -r '.status // "unreachable"')
            echo "Attempt $i: health=$STATUS"
            [ "$STATUS" = "healthy" ] || [ "$STATUS" = "degraded" ] && exit 0
            sleep 5
          done
          echo "::error::Health check failed after 40s! Dumping logs:"
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.DEPLOY_HOST }} \
            'docker logs --tail 50 gremlin'
          exit 1

      - name: Announce failed rebirth
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="-1002401283379" \
            -d message_thread_id="2012" \
            -d text="🔴 *Gremlin's rebirth failed.* \`$(git rev-parse --short HEAD)\` — deploy did not complete." \
            -d parse_mode="Markdown"

      - name: Cleanup
        if: always()
        run: |
          rm -f .env ~/.ssh/deploy_key
